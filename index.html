<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Botched Waffle — The News You Actually Need</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0D0D0D;
      --paper:  #F7F3EC;
      --cream:  #EDE8DE;
      --warm:   #D4A853;
      --rust:   #C4522A;
      --sage:   #4A6741;
      --slate:  #3D4F5C;
      --muted:  #8A8278;
      --rule:   #C8BFB0;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── MASTHEAD ─── */
    header {
      border-bottom: 3px solid var(--ink);
      padding: 0 2rem;
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 0 var(--rule);
    }

    .masthead-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0 0.5rem;
      border-bottom: 1px solid var(--rule);
    }

    .dateline {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .tagline-top {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .masthead-logo {
      text-align: center;
      padding: 1rem 0;
    }

    .masthead-logo h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(2.6rem, 6vw, 5rem);
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--ink);
    }

    .masthead-logo h1 span {
      color: var(--rust);
      font-style: italic;
    }

    .masthead-tagline {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 0.35rem;
    }

    /* ─── SECTION NAV ─── */
    nav.section-nav {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      border-top: 1px solid var(--rule);
    }

    nav.section-nav::-webkit-scrollbar { display: none; }

    nav.section-nav a {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink);
      text-decoration: none;
      padding: 0.65rem 1.2rem;
      white-space: nowrap;
      border-right: 1px solid var(--rule);
      transition: background 0.15s, color 0.15s;
    }

    nav.section-nav a:hover,
    nav.section-nav a.active {
      background: var(--ink);
      color: var(--paper);
    }

    /* ─── BREAKING TICKER ─── */
    .ticker-bar {
      background: var(--ink);
      color: var(--paper);
      padding: 0.45rem 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .ticker-inner {
      display: inline-flex;
      animation: scroll-ticker 35s linear infinite;
    }

    .ticker-inner:hover { animation-play-state: paused; }

    @keyframes scroll-ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .ticker-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      background: var(--rust);
      color: white;
      padding: 0.1rem 0.5rem;
      margin-right: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .ticker-item {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      margin-right: 3rem;
    }

    .ticker-sep {
      color: var(--warm);
      margin-right: 3rem;
    }

    /* ─── MAIN LAYOUT ─── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
    }

    /* ─── HERO FEED ─── */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto;
      gap: 0;
      border: 1px solid var(--rule);
      margin-bottom: 2.5rem;
    }

    .hero-main {
      grid-column: 1 / 3;
      border-right: 1px solid var(--rule);
      padding: 2rem;
    }

    .hero-side {
      display: flex;
      flex-direction: column;
    }

    .hero-side .side-item {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--rule);
      flex: 1;
    }

    .hero-side .side-item:last-child {
      border-bottom: none;
    }

    /* ─── CARD SHARED ─── */
    .feed-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      display: inline-block;
      padding: 0.2rem 0.5rem;
      margin-bottom: 0.75rem;
    }

    .tag-tech    { background: var(--slate); color: white; }
    .tag-world   { background: var(--sage);  color: white; }
    .tag-finance { background: var(--rust);  color: white; }
    .tag-science { background: #5C4A8A;      color: white; }
    .tag-culture { background: var(--warm);  color: var(--ink); }
    .tag-sports  { background: #2A6B4A;      color: white; }

    .hero-main .card-headline {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 2rem;
      line-height: 1.2;
      margin-bottom: 0.75rem;
      color: var(--ink);
    }

    .hero-main .card-deck {
      font-size: 15px;
      color: #444;
      line-height: 1.65;
      margin-bottom: 1rem;
    }

    .card-meta {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card-meta strong {
      color: var(--rust);
      font-weight: 500;
    }

    .side-item .card-headline {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.05rem;
      line-height: 1.3;
      margin-bottom: 0.4rem;
      color: var(--ink);
    }

    /* ─── SECTION HEADERS ─── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.2rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--ink);
    }

    .section-header h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: -0.01em;
    }

    .section-header .section-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    /* ─── 3-COL FEED GRID ─── */
    .feed-section {
      margin-bottom: 3rem;
    }

    .feed-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5px;
      background: var(--rule);
      border: 1.5px solid var(--rule);
    }

    .feed-card {
      background: var(--paper);
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .feed-card:hover {
      background: var(--cream);
    }

    .feed-card .card-headline {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.05rem;
      line-height: 1.3;
      margin-bottom: 0.5rem;
      color: var(--ink);
    }

    .feed-card .card-blurb {
      font-size: 13px;
      color: #555;
      line-height: 1.55;
      margin-bottom: 0.75rem;
    }

    .read-more {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--rust);
      font-weight: 500;
      text-decoration: none;
    }

    .read-more::after {
      content: ' →';
    }

    /* ─── 2-COL EDITORIAL ─── */
    .feed-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5px;
      background: var(--rule);
      border: 1.5px solid var(--rule);
    }

    /* ─── OPINION / FEATURED ─── */
    .opinion-block {
      background: var(--ink);
      color: var(--paper);
      padding: 2rem;
      margin-bottom: 3rem;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2rem;
    }

    .opinion-block .block-header {
      grid-column: 1 / -1;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--warm);
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #333;
      margin-bottom: 0.5rem;
    }

    .opinion-card .opinion-headline {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-style: italic;
      font-size: 1.1rem;
      line-height: 1.35;
      margin-bottom: 0.5rem;
      color: var(--paper);
    }

    .opinion-card .opinion-author {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--warm);
    }

    .opinion-card .opinion-blurb {
      font-size: 13px;
      color: #AAA;
      line-height: 1.55;
      margin: 0.4rem 0 0.75rem;
    }

    /* ─── FOOTER ─── */
    footer {
      border-top: 3px solid var(--ink);
      padding: 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2rem;
      background: var(--cream);
    }

    .footer-brand .brand-name {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 1.8rem;
      color: var(--ink);
    }

    .footer-brand .brand-name span { color: var(--rust); font-style: italic; }

    .footer-brand p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 0.5rem;
      line-height: 1.6;
    }

    .footer-col h4 {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.75rem;
      color: var(--ink);
    }

    .footer-col ul {
      list-style: none;
    }

    .footer-col ul li {
      font-size: 13px;
      color: var(--muted);
      padding: 0.2rem 0;
      cursor: pointer;
    }

    .footer-col ul li:hover { color: var(--rust); }

    .footer-bottom {
      border-top: 1px solid var(--rule);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--cream);
    }

    .footer-bottom p {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ─── PLACEHOLDER IMAGE BLOCKS ─── */
    .img-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, var(--cream) 0%, var(--rule) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ─── SEARCH BAR ─── */
    .search-row {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 2rem;
      border: 1.5px solid var(--rule);
    }

    .search-row input {
      flex: 1;
      border: none;
      background: var(--paper);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 0.75rem 1rem;
      color: var(--ink);
      outline: none;
    }

    .search-row input::placeholder { color: var(--muted); }

    .search-row button {
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .search-row button:hover { background: var(--rust); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .hero-grid { grid-template-columns: 1fr; }
      .hero-main { grid-column: 1; border-right: none; border-bottom: 1px solid var(--rule); }
      .feed-grid-3 { grid-template-columns: 1fr 1fr; }
      .feed-grid-2 { grid-template-columns: 1fr; }
      .opinion-block { grid-template-columns: 1fr; }
      footer { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .feed-grid-3 { grid-template-columns: 1fr; }
      .masthead-logo h1 { font-size: 2.4rem; }
      main { padding: 1rem 1rem 3rem; }
      header { padding: 0 1rem; }
    }
  </style>

<script>
  // Live date in masthead
  function updateDate() {
    const el = document.getElementById('live-date');
    if (!el) return; // prevent crash if element isn't found
    const now = new Date();
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    el.textContent = now.toLocaleDateString('en-US', opts);
  }
  updateDate();

  // Active nav highlight on scroll
  const sections = document.querySelectorAll('section[id]');
  const navLinks = document.querySelectorAll('nav.section-nav a');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        navLinks.forEach(a => a.classList.remove('active'));
        const active = document.querySelector(`nav.section-nav a[href="#${entry.target.id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-40% 0px -55% 0px' });

  sections.forEach(s => observer.observe(s));

  // Search (placeholder behavior)
  const searchBtn = document.querySelector('.search-row button');
  if (searchBtn) {
    searchBtn.addEventListener('click', () => {
      const input = document.querySelector('.search-row input');
      const val = input ? input.value.trim() : '';
      if (val) alert(`Search for "${val}" — connect this to your news API or CMS.`);
    });
  }
</script>

  const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function tagClass(section) {
    const s = (section || "").toLowerCase();
    if (s.includes("tech")) return "tag-tech";
    if (s.includes("finance")) return "tag-finance";
    if (s.includes("world")) return "tag-world";
    if (s.includes("science")) return "tag-science";
    if (s.includes("culture")) return "tag-culture";
    return "tag-world";
  }

  function timeAgo(dateStr) {
    if (!dateStr) return "";
    const dt = new Date(dateStr);
    const diffMs = Date.now() - dt.getTime();
    const mins = Math.floor(diffMs / 60000);
    if (mins < 60) return `${mins} min ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs} hr ago`;
    const days = Math.floor(hrs / 24);
    return `${days} day${days === 1 ? "" : "s"} ago`;
  }

  async function loadPublished() {
    const { data, error } = await supabase
      .from("articles")
      .select("headline, blurb, source_name, source_url, published_at, section, status")
      .eq("status", "published")
      .order("published_at", { ascending: false })
      .limit(50);

    if (error) {
      console.error("Failed to load articles:", error.message);
      return;
    }

    // UPDATED: Populate the Science section cards as proof it works (since you have science/culture feeds right now).
    const sci = (data || [])
      .filter(a => (a.section || "").toLowerCase().includes("science"))
      .slice(0, 3);

    const sciSection = document.querySelector("#science .feed-grid-2");
    if (!sciSection) return;

    if (sci.length === 0) {
      sciSection.innerHTML = `<div class="feed-card"><p>No published Science articles yet.</p></div>`;
      return;
    }

    sciSection.innerHTML = sci.map(a => `
      <div class="feed-card">
        <span class="feed-tag ${tagClass(a.section)}">${a.section || "Science"}</span>
        <h3 class="card-headline">${a.headline || ""}</h3>
        <p class="card-meta"><strong>${a.source_name || ""}</strong>${a.published_at ? " · " + timeAgo(a.published_at) : ""}</p>
        ${a.source_url ? `<br/><a class="read-more" href="${a.source_url}" target="_blank" rel="noreferrer">Read more</a>` : ""}
      </div>
    `).join("");
  }

  loadPublished();
</script>
