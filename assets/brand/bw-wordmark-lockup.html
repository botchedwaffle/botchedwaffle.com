<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F7F5F2; display: inline-block; padding: 32px 40px; }
  .lockup { display: flex; align-items: center; gap: 20px; }
  .wordmark { font-family: 'Lora', Georgia, serif; font-size: 80px; line-height: 1; color: #1C1C1C; white-space: nowrap; }
  .wordmark .bold { font-weight: 700; }
  .wordmark .regular { font-weight: 400; }
</style>
</head>
<body>
<div class="lockup">
  <svg width="120" height="120" viewBox="0 0 170 170" xmlns="http://www.w3.org/2000/svg">
    <rect x="10"  y="10"  width="44" height="44" rx="4" fill="none" stroke="#C0441E" stroke-width="3"/>
    <rect x="60"  y="10"  width="44" height="44" rx="4" fill="none" stroke="#C0441E" stroke-width="3"/>
    <rect x="110" y="10"  width="44" height="44" rx="4" fill="none" stroke="#C0441E" stroke-width="3"/>
    <rect x="10"  y="60"  width="44" height="44" rx="4" fill="none" stroke="#C0441E" stroke-width="3"/>
    <rect x="60"  y="60"  width="44" height="44" rx="4" fill="none" stroke="#C0441E" stroke-width="3"/>
    <rect x="110" y="60"  width="44" height="44" rx="4" fill="none" stroke="#C0441E" stroke-width="3"/>
    <rect x="10"  y="110" width="44" height="44" rx="4" fill="none" stroke="#C0441E" stroke-width="3"/>
    <rect x="60"  y="110" width="44" height="44" rx="4" fill="none" stroke="#C0441E" stroke-width="3"/>
    <rect x="114.5" y="114.5" width="47" height="47" rx="4" fill="#C0441E" transform="rotate(10 138 138)"/>
  </svg>
  <div class="wordmark">
    <span class="regular">Botched</span><span class="bold">Waffle</span>
  </div>
</div>
</body>
</html>
